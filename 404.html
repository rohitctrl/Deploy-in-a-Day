<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Deploy in a Day</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --accent: #c8f135;
    --text: #e8e8e8;
    --text-dim: #888;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .tag {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 0.3rem 0.7rem;
    letter-spacing: 0.12em;
    margin-bottom: 2rem;
  }
  h1 {
    font-size: clamp(4rem, 12vw, 8rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--accent);
  }
  p {
    margin-top: 1rem;
    color: var(--text-dim);
    font-size: 1.1rem;
    max-width: 480px;
  }
  a.btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--accent);
    color: #000;
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 700;
    padding: 1rem 2rem;
    text-decoration: none;
    letter-spacing: 0.06em;
    margin-top: 2.5rem;
    transition: background 0.2s, transform 0.2s;
  }
  a.btn:hover {
    background: #3dffa0;
    transform: translateY(-2px);
  }
</style>
</head>
<body>
  <span class="tag">ERROR 404</span>
  <h1>404</h1>
  <p>This route doesn't exist in the stack. It may have been moved, torn down, or never deployed.</p>
  <a class="btn" href="/">&larr; back to root</a>
</body>
</html>
